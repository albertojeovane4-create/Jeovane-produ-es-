<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeovane Produções — Serviços criativos que fazem a tua marca crescer</title>
<meta name="description" content="Estratégia de projeto, design gráfico, gestão de conta e edição de vídeo — checkout direto pelo WhatsApp.">

<!-- ============================================================
     CONFIGURAÇÃO RÁPIDA — troque só estas duas linhas
     ============================================================ -->
<!-- (a configuração real fica no bloco de JavaScript no fim do arquivo,
     procure por WHATSAPP_NUMBER e ADMIN_PASSWORD) -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>

<style>
/* ===================== TOKENS ===================== */
:root{
  --paper:#EFEDE6;
  --paper-2:#F8F7F2;
  --ink:#16140F;
  --ink-soft:#55503F;
  --pink:#FF3D7F;
  --pink-dark:#D6225C;
  --teal:#0B7A66;
  --teal-dark:#075B4C;
  --mustard:#FFC83D;
  --whats:#25D366;
  --whats-dark:#1DA851;
  --line:rgba(22,20,15,.16);
  --line-soft:rgba(22,20,15,.09);
  --radius:18px;
  --radius-sm:10px;
  --shadow:0 10px 30px rgba(22,20,15,.10);
  --shadow-lg:0 18px 50px rgba(22,20,15,.16);
  --display:"Bricolage Grotesque",system-ui,sans-serif;
  --body:"Inter",system-ui,sans-serif;
  --mono:"Space Mono",ui-monospace,monospace;
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:var(--body);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
img{max-width:100%;display:block;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
:focus-visible{outline:3px solid var(--ink);outline-offset:2px;}
.hidden{display:none !important;}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;scroll-behavior:auto !important;}
}

/* ===================== LAYOUT SHELL ===================== */
.site-header{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;
  background:rgba(239,237,230,.86);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.brand{
  font-family:var(--display);
  font-weight:800;
  font-size:1.35rem;
  letter-spacing:-.02em;
  text-decoration:none;
  display:flex;align-items:center;gap:8px;
}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--pink);display:inline-block;}
.main-nav{display:flex;align-items:center;gap:22px;}
.nav-link{
  text-decoration:none;font-weight:600;font-size:.95rem;color:var(--ink-soft);
  display:flex;align-items:center;gap:6px;
}
.nav-link.cart-link{
  position:relative;color:var(--ink);
  background:var(--ink);color:var(--paper-2);
  padding:8px 14px;border-radius:999px;
}
.cart-badge{
  font-family:var(--mono);font-size:.72rem;
  background:var(--pink);color:#fff;
  padding:1px 6px;border-radius:999px;
  min-width:18px;text-align:center;
}

main#app{min-height:60vh;}

.site-footer{
  margin-top:60px;padding:34px 28px 90px;
  border-top:1px solid var(--line);
  display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center;
  font-size:.85rem;color:var(--ink-soft);
}
.site-footer a{text-decoration:underline;text-underline-offset:3px;}

/* ===================== HERO ===================== */
.hero{
  padding:64px 28px 30px;
  max-width:1100px;margin:0 auto;
}
.eyebrow{
  font-family:var(--mono);
  text-transform:uppercase;
  letter-spacing:.12em;
  font-size:.72rem;
  color:var(--pink-dark);
  margin:0 0 10px;
  font-weight:700;
}
.hero h1{
  font-family:var(--display);
  font-weight:800;
  font-size:clamp(2.1rem,5.2vw,3.6rem);
  line-height:1.02;
  letter-spacing:-.02em;
  margin:0 0 18px;
  max-width:14ch;
}
.hero h1 em{font-style:normal;color:var(--pink);}
.hero p.lede{
  font-size:1.08rem;color:var(--ink-soft);max-width:46ch;margin:0 0 28px;
}

.marquee{
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
  overflow:hidden;
  white-space:nowrap;
  margin:0 0 46px;
}
.marquee-track{
  display:inline-block;
  padding:13px 0;
  font-family:var(--mono);
  font-size:.82rem;
  letter-spacing:.04em;
  animation:scroll-left 26s linear infinite;
}
.marquee-track span{margin:0 22px;color:var(--ink-soft);}
.marquee-track span.accent{color:var(--pink-dark);font-weight:700;}
@keyframes scroll-left{
  from{transform:translateX(0);}
  to{transform:translateX(-50%);}
}

/* ===================== PRODUCT GRID ===================== */
.grid-wrap{max-width:1100px;margin:0 auto;padding:0 28px 70px;}
.grid-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:22px;flex-wrap:wrap;gap:8px;}
.grid-head h2{font-family:var(--display);font-size:1.5rem;margin:0;}
.grid-head .count{font-family:var(--mono);font-size:.8rem;color:var(--ink-soft);}

.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:26px;
}

.ticket-card{
  background:var(--paper-2);
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:var(--shadow);
  transition:transform .18s ease, box-shadow .18s ease;
}
.ticket-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}

.ticket-media{
  position:relative;border:0;padding:0;margin:0;width:100%;background:none;text-align:left;
}
.ticket-media img{width:100%;height:170px;object-fit:cover;}
.stamp{
  position:absolute;top:12px;right:-30px;
  background:var(--ink);color:var(--mustard);
  font-family:var(--mono);font-size:.66rem;font-weight:700;
  padding:5px 34px;
  transform:rotate(8deg);
  box-shadow:0 3px 8px rgba(0,0,0,.25);
}

.perforation{
  height:14px;
  background-image:radial-gradient(circle, var(--paper) 3px, transparent 3.2px);
  background-size:16px 14px;
  background-position:6px center;
  background-repeat:repeat-x;
  border-top:1px dashed var(--line);
  border-bottom:1px dashed var(--line);
}

.ticket-body{padding:18px 18px 20px;display:flex;flex-direction:column;gap:6px;flex:1;}
.ticket-body .eyebrow{margin-bottom:2px;}
.ticket-body h3{
  font-family:var(--display);font-size:1.12rem;line-height:1.2;margin:0 0 4px;font-weight:700;
}
.ticket-body .desc{
  font-size:.88rem;color:var(--ink-soft);line-height:1.45;margin:0 0 10px;flex:1;
}
.price-row{display:flex;align-items:baseline;gap:9px;margin-bottom:12px;}
.old-price{font-family:var(--mono);font-size:.8rem;color:var(--ink-soft);text-decoration:line-through;}
.price{font-family:var(--mono);font-size:1.28rem;font-weight:700;}

.btn{
  border:none;border-radius:999px;padding:12px 20px;
  font-weight:700;font-size:.92rem;font-family:var(--body);
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  text-decoration:none;transition:transform .12s ease, filter .12s ease;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--pink);color:#fff;}
.btn-primary:hover{filter:brightness(1.06);}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
.btn-ghost:hover{border-color:var(--ink);}
.btn-block{width:100%;}
.btn-dark{background:var(--ink);color:var(--paper-2);}
.btn-whats{background:var(--whats);color:#fff;}
.btn-whats:hover{background:var(--whats-dark);}

/* ===================== MODAL (quick view) ===================== */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(22,20,15,.55);
  display:flex;align-items:center;justify-content:center;
  padding:20px;z-index:80;
}
.modal{
  background:var(--paper-2);border-radius:var(--radius);
  max-width:560px;width:100%;max-height:88vh;overflow:auto;
  box-shadow:var(--shadow-lg);position:relative;
}
.modal-close{
  position:absolute;top:14px;right:14px;background:var(--ink);color:var(--paper-2);
  width:34px;height:34px;border-radius:50%;border:none;font-size:1.1rem;line-height:1;
}
.modal img{width:100%;height:220px;object-fit:cover;}
.modal-body{padding:22px;}
.modal-body h3{font-family:var(--display);font-size:1.4rem;margin:6px 0 8px;}
.modal-qty{display:flex;align-items:center;gap:12px;margin:16px 0;font-family:var(--mono);}
.modal-qty button{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:1.1rem;}

/* ===================== TOAST ===================== */
#toast-region{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast{
  background:var(--ink);color:var(--paper-2);
  padding:11px 18px;border-radius:999px;font-size:.86rem;font-weight:600;
  box-shadow:var(--shadow-lg);
  animation:toast-in .2s ease;
}
@keyframes toast-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ===================== WHATSAPP FLOAT ===================== */
.wa-float{
  position:fixed;bottom:22px;right:22px;z-index:70;
  width:58px;height:58px;border-radius:50%;
  background:var(--whats);border:none;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 24px rgba(37,211,102,.45);
  animation:wa-pulse 2.6s ease-in-out infinite;
}
.wa-float:hover{background:var(--whats-dark);}
@keyframes wa-pulse{
  0%,100%{box-shadow:0 10px 24px rgba(37,211,102,.45);}
  50%{box-shadow:0 10px 30px rgba(37,211,102,.7);}
}

/* ===================== RECEIPT (cart / checkout) ===================== */
.receipt-wrap{max-width:560px;margin:0 auto;padding:54px 20px 90px;}
.receipt{
  background:var(--paper-2);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:30px 26px;
  box-shadow:var(--shadow);
  position:relative;
}
.receipt h2{font-family:var(--display);font-size:1.6rem;margin:0 0 18px;}
.receipt.empty{text-align:center;padding:60px 26px;}
.receipt.empty h2{margin-top:4px;}
.receipt.empty .btn{margin-top:16px;}

.barcode{
  height:30px;margin:0 0 18px;border-radius:4px;
  background:repeating-linear-gradient(90deg, var(--ink) 0 2px, transparent 2px 5px, var(--ink) 5px 6px, transparent 6px 11px);
  opacity:.85;
}

.receipt-rows{display:flex;flex-direction:column;gap:12px;font-family:var(--mono);}
.receipt-row{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:.86rem;}
.receipt-row.sm{font-size:.82rem;}
.ri-name{display:flex;align-items:center;gap:8px;flex:1;}
.ri-remove{background:none;border:none;color:var(--ink-soft);font-size:1rem;line-height:1;padding:0 2px;}
.ri-remove:hover{color:var(--pink-dark);}
.ri-qty{display:flex;align-items:center;gap:8px;}
.ri-qty button{width:24px;height:24px;border-radius:6px;border:1px solid var(--line);background:#fff;font-family:var(--mono);}
.ri-price{min-width:84px;text-align:right;font-weight:700;}

.receipt-divider{
  border-top:1px dashed var(--line);margin:18px 0;
}
.receipt-total{
  display:flex;justify-content:space-between;align-items:baseline;
  font-family:var(--mono);font-weight:700;font-size:1.25rem;margin-bottom:22px;
}

.receipt label{
  display:block;font-size:.82rem;font-weight:600;color:var(--ink-soft);margin-bottom:14px;
}
.receipt input,.receipt textarea{
  display:block;width:100%;margin-top:6px;
  padding:11px 13px;border-radius:var(--radius-sm);
  border:1.5px solid var(--line);background:#fff;
  font-family:var(--body);font-size:.95rem;color:var(--ink);
}
.receipt input:focus,.receipt textarea:focus{border-color:var(--ink);}
.checkout-note{font-size:.78rem;color:var(--ink-soft);text-align:center;margin:12px 0 0;}

/* ===================== ADMIN ===================== */
.admin-gate{
  max-width:380px;margin:90px auto;padding:0 20px;
}
.admin-gate form{
  background:var(--ink);color:var(--paper-2);
  padding:32px 26px;border-radius:var(--radius);box-shadow:var(--shadow-lg);
}
.admin-gate h2{font-family:var(--display);margin:0 0 18px;}
.admin-gate .eyebrow{color:var(--mustard);}
.admin-gate label{display:block;font-size:.85rem;margin-bottom:18px;}
.admin-gate input{
  display:block;width:100%;margin-top:8px;padding:11px 13px;
  border-radius:var(--radius-sm);border:1.5px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.06);color:#fff;font-family:var(--mono);
}
.admin-error{color:var(--pink);font-size:.82rem;margin-top:10px;}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-6px);}
  75%{transform:translateX(6px);}
}
.shake{animation:shake .35s ease;}

.admin-dash{background:var(--ink);min-height:100vh;color:var(--paper-2);padding:34px 26px 90px;}
.admin-top{
  max-width:1180px;margin:0 auto 30px;
  display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;
}
.admin-top h1{font-family:var(--display);font-size:1.7rem;margin:6px 0 0;}
.admin-top .eyebrow{color:var(--mustard);}
.admin-actions{display:flex;gap:10px;}
.admin-actions button{
  background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.18);
  border-radius:999px;padding:9px 16px;font-size:.82rem;font-weight:600;
}
.admin-actions button:hover{background:rgba(255,255,255,.16);}

.admin-grid{max-width:1180px;margin:0 auto;display:grid;gap:20px;}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;}
.stat-card{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius);padding:20px;
}
.stat-card .label{font-size:.76rem;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:8px;}
.stat-card .value{font-family:var(--mono);font-size:1.9rem;font-weight:700;}
.stat-card .value.pink{color:var(--pink);}
.stat-card .value.teal{color:#4FD8BD;}
.stat-card .value.mustard{color:var(--mustard);}

.insight-card{
  background:linear-gradient(135deg, rgba(255,61,127,.16), rgba(255,200,61,.10));
  border:1px solid rgba(255,200,61,.3);
  border-radius:var(--radius);padding:22px 24px;
  display:flex;gap:14px;align-items:flex-start;
}
.insight-card .ic-label{font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--mustard);font-weight:700;margin-bottom:6px;}
.insight-card p{margin:0;line-height:1.5;font-size:.98rem;}

.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px;}
.chart-card{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius);padding:20px;
}
.chart-card h3{font-family:var(--display);font-size:1rem;margin:0 0 14px;font-weight:700;}
.chart-card canvas{max-height:240px;}

.admin-table-wrap{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius);padding:20px;overflow-x:auto;
}
.admin-table-wrap h3{font-family:var(--display);font-size:1rem;margin:0 0 14px;}
table.admin-table{width:100%;border-collapse:collapse;font-size:.86rem;min-width:560px;}
table.admin-table th{
  text-align:left;font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;
  color:rgba(255,255,255,.5);padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.14);
}
table.admin-table td{padding:10px 10px;border-bottom:1px solid rgba(255,255,255,.07);font-family:var(--mono);}
table.admin-table td.prod-name{font-family:var(--body);font-weight:600;}
.conv-pill{padding:2px 9px;border-radius:999px;font-size:.76rem;font-weight:700;}
.conv-good{background:rgba(79,216,189,.18);color:#4FD8BD;}
.conv-mid{background:rgba(255,200,61,.18);color:var(--mustard);}
.conv-low{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);}

@media (max-width:640px){
  .site-header{padding:14px 16px;}
  .hero{padding:40px 18px 16px;}
  .receipt-wrap{padding:36px 14px 70px;}
}
</style>
</head>

  }
];

function getProduct(id){ return PRODUCTS.find(p=>p.id===id); }
function fmt(n){ return (Number(n)||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2}); }

/* ======================================================================
   CARRINHO (localStorage)
   ====================================================================== */
const CART_KEY = "bazar_cart";
function loadCart(){ try{ return JSON.parse(localStorage.getItem(CART_KEY)||"[]"); }catch(e){ return []; } }
function saveCart(c){ localStorage.setItem(CART_KEY, JSON.stringify(c)); updateCartBadge(); }
function addToCart(id, qty=1){
  const c = loadCart();
  const ex = c.find(i=>i.id===id);
  if(ex) ex.qty += qty; else c.push({id, qty});
  saveCart(c);
}
function setQty(id, qty){
  let c = loadCart();
  if(qty<=0){ c = c.filter(i=>i.id!==id); }
  else { const it=c.find(i=>i.id===id); if(it) it.qty=qty; }
  saveCart(c);
}
function cartCount(){ return loadCart().reduce((s,i)=>s+i.qty,0); }
function cartTotal(){ return loadCart().reduce((s,i)=>{ const p=getProduct(i.id); return s+(p?p.price*i.qty:0); },0); }
function updateCartBadge(){
  document.querySelectorAll('.cart-badge').forEach(el=>{ el.textContent = cartCount(); });
}

/* ======================================================================
   ANALYTICS / "IA" DE ESTATÍSTICAS  (rule-based, 100% local)
   ====================================================================== */
const STATS_KEY = "bazar_analytics";
function loadStats(){
  try{
    const raw = localStorage.getItem(STATS_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { views:{}, clicksAddCart:{}, checkouts:{}, checkoutCount:0, hourly:new Array(24).fill(0), waFloatClicks:0, insightDate:null, insightText:null };
}
function saveStats(s){ localStorage.setItem(STATS_KEY, JSON.stringify(s)); }
function trackView(id){ const s=loadStats(); s.views[id]=(s.views[id]||0)+1; saveStats(s); }
function trackAddCart(id){ const s=loadStats(); s.clicksAddCart[id]=(s.clicksAddCart[id]||0)+1; saveStats(s); }
function trackCheckout(items){
  const s=loadStats();
  items.forEach(it=>{ s.checkouts[it.id]=(s.checkouts[it.id]||0)+it.qty; });
  s.checkoutCount = (s.checkoutCount||0)+1;
  saveStats(s);
}
function trackWaFloat(){ const s=loadStats(); s.waFloatClicks=(s.waFloatClicks||0)+1; saveStats(s); }
function recordHourlyVisit(){
  const s=loadStats();
  const h=new Date().getHours();
  s.hourly[h]=(s.hourly[h]||0)+1;
  saveStats(s);
}

function computeInsight(s){
  const totalClicks = Object.values(s.clicksAddCart).reduce((a,b)=>a+b,0);
  if(totalClicks===0){
    return "📊 Ainda não há cliques registrados em \"Adicionar ao carrinho\". Compartilhe o link da loja para começar a gerar estatísticas.";
  }
  let best=null;
  PRODUCTS.forEach(p=>{
    const clicks = s.clicksAddCart[p.id]||0;
    const orders = s.checkouts[p.id]||0;
    if(clicks>=2){
      const conv = (orders/clicks)*100;
      if(!best || conv>best.conv) best={p,conv,clicks,orders};
    }
  });
  if(best && best.conv>=50){
    return `🔥 "${best.p.title}" está com ${best.conv.toFixed(0)}% de conversão (${best.orders} de ${best.clicks} cliques viraram pedido). Vale impulsionar esse produto com mais divulgação ou anúncios.`;
  }
  let mostViewed=null;
  PRODUCTS.forEach(p=>{
    const v=s.views[p.id]||0;
    if(!mostViewed || v>mostViewed.v) mostViewed={p,v};
  });
  if(mostViewed && mostViewed.v>=3){
    const clicks=s.clicksAddCart[mostViewed.p.id]||0;
    const rate = mostViewed.v ? (clicks/mostViewed.v*100) : 0;
    if(rate<20){
      return `👀 "${mostViewed.p.title}" é o mais visualizado da loja, mas só ${rate.toFixed(0)}% de quem vê adiciona ao carrinho. Pode valer revisar o preço, a imagem ou a descrição.`;
    }
  }
  const maxHourly = Math.max(...s.hourly);
  if(maxHourly>0){
    const peakHour = s.hourly.indexOf(maxHourly);
    return `⏰ Seu horário de pico de acessos é às ${peakHour}h. Concentre posts, stories e anúncios perto desse horário para aproveitar o movimento.`;
  }
  return "📈 Continue divulgando a loja — assim que houver mais dados, um novo insight aparece aqui a cada dia.";
}
function getDailyInsight(){
  const s = loadStats();
  const today = new Date().toISOString().slice(0,10);
  if(s.insightDate===today && s.insightText) return s.insightText;
  const text = computeInsight(s);
  s.insightDate = today; s.insightText = text;
  saveStats(s);
  return text;
}

/* ======================================================================
   TOAST
   ====================================================================== */
function showToast(msg){
  const region = document.getElementById('toast-region');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  region.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .25s'; setTimeout(()=>t.remove(),260); }, 2200);
}

/* ======================================================================
   WHATSAPP HELPERS
   ====================================================================== */
function buildOrderMessage(nome, telefone, obs, cart){
  const lines = cart.map(i=>{
    const p=getProduct(i.id);
    return `• ${i.qty}x ${p.title} — ${fmt(p.price*i.qty)} MT`;
  }).join('\n');
  let msg = `Olá! Meu nome é ${nome}.\nQuero finalizar este pedido:\n\n${lines}\n\nTotal: ${fmt(cartTotal())} MT`;
  if(telefone) msg += `\nMeu WhatsApp: ${telefone}`;
  if(obs) msg += `\nObservação: ${obs}`;
  msg += `\n\n(Pedido enviado pelo site Jeovane Produções)`;
  return msg;
}
function whatsappUrl(message){
  return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
}

document.getElementById('wa-float').addEventListener('click', ()=>{
  trackWaFloat();
  const msg = "Olá! Vim do site Jeovane Produções e gostaria de mais informações.";
  window.open(whatsappUrl(msg), '_blank');
});

function openQuickView(id){
  const p = getProduct(id);
  if(!p) return;
  trackView(id);
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true" aria-label="${p.title}">
      <button class="modal-close" type="button" aria-label="Fechar">×</button>
      <img src="${p.img}" alt="${p.title}">
      <div class="modal-body">
        <p class="eyebrow">${p.category}</p>
        <h3>${p.title}</h3>
        <p class="desc">${p.desc}</p>
        <div class="price-row">
          ${p.oldPrice ? `<span class="old-price">${fmt(p.oldPrice)} MT</span>` : ''}
          <span class="price">${fmt(p.price)} MT</span>
        </div>
        <div class="modal-qty">
          <button type="button" data-qv-action="dec">−</button>
          <span id="qv-qty">1</span>
          <button type="button" data-qv-action="inc">+</button>
        </div>
        <button class="btn btn-primary btn-block" type="button" id="qv-add">Adicionar ao carrinho</button>
      </div>
    </div>`;
  document.body.appendChild(backdrop);
  let qty = 1;
  const qtyEl = backdrop.querySelector('#qv-qty');
  backdrop.addEventListener('click', (e)=>{
    if(e.target===backdrop || e.target.closest('.modal-close')){ backdrop.remove(); return; }
    const dec = e.target.closest('[data-qv-action="dec"]');
    const inc = e.target.closest('[data-qv-action="inc"]');
    if(dec){ qty=Math.max(1,qty-1); qtyEl.textContent=qty; }
    if(inc){ qty=qty+1; qtyEl.textContent=qty; }
    if(e.target.closest('#qv-add')){
      addToCart(p.id, qty);
      trackAddCart(p.id);
      showToast(`Adicionado: ${p.title}`);
      backdrop.remove();
    }
  });
}

   RENDER: CARRINHO (estilo recibo)

  if(cart.length===0){
    app.innerHTML = `
    <section class="receipt-wrap">
      <div class="receipt empty">
        <p class="eyebrow">Carrinho</p>
        <h2>Seu carrinho está vazio</h2>

        <a href="#/" class="btn btn-primary">Ver produtos</a>

  }

    const p = getProduct(i.id);

    <div class="receipt-row">
      <div class="ri-name">${p.title}
        <button class="ri-remove" type="button" data-action="remove" data-id="${p.id}" aria-label="Remover ${p.title}">×</button>

      <a href="#/checkout" class="btn btn-primary btn-block">Continuar para o checkout</a>

    </div>
  </section>`;
}

/* ======================================================================
   RENDER: CHECKOUT
   ====================================================================== */
function renderCheckout(){
  const cart = loadCart();
  if(cart.length===0){ location.hash = '#/'; return; }
  const app = document.getElementById('app');
  const itemsHtml = cart.map(i=>{
    const p = getProduct(i.id);
    return `<div class="receipt-row sm"><span>${i.qty}× ${p.title}</span><span>${fmt(p.price*i.qty)} MT</span></div>`;
  }).join('');

  app.innerHTML = `
  <section class="receipt-wrap">
    <form class="receipt" id="checkout-form" novalidate>
      <p class="eyebrow">Finalizar pedido</p>
      <h2>Confirme seus dados</h2>
      <div class="receipt-rows">${itemsHtml}</div>
      <div class="receipt-divider"></div>
      <div class="receipt-total"><span>Total</span><span>${fmt(cartTotal())} MT</span></div>

      <label>Nome completo *
        <input type="text" name="nome" required placeholder="Como podemos te chamar?">
      </label>
      <label>WhatsApp (opcional)
        <input type="tel" name="telefone" placeholder="(11) 99999-9999">
      </label>
      <label>Observação (opcional)
        <textarea name="obs" rows="2" placeholder="Cupom, dúvida, forma de pagamento..."></textarea>
      </label>

      <button type="submit" class="btn btn-whats btn-block">Enviar pedido pelo WhatsApp</button>
      <p class="checkout-note">Você será redirecionado ao WhatsApp para confirmar o pedido.</p>
    </form>
  </section>`;

  document.getElementById('checkout-form').addEventListener('submit', handleCheckoutSubmit);
}

function handleCheckoutSubmit(e){
  e.preventDefault();
  const fd = new FormData(e.target);
  const nome = (fd.get('nome')||'').toString().trim();
  if(!nome){
    const input = e.target.querySelector('input[name="nome"]');
    input.style.borderColor = 'var(--pink)';
    input.focus();
    return;
  }
  const telefone = (fd.get('telefone')||'').toString().trim();
  const obs = (fd.get('obs')||'').toString().trim();
  const cart = loadCart();

  const message = buildOrderMessage(nome, telefone, obs, cart);
  trackCheckout(cart);

  const submitBtn = e.target.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Redirecionando para o WhatsApp...';

  const url = whatsappUrl(message);
  saveCart([]);

  setTimeout(()=>{ window.location.href = url; }, 650);
}

const ADMIN_AUTH_KEY = "bazar_admin_auth";
let _charts = {};

function renderAdminRoute(){

    renderAdminDashboard();
  } else {
    renderAdminLogin();
  }
}

function convClass(rate){
  if(rate>=40) return 'conv-good';
  if(rate>=15) return 'conv-mid';
  return 'conv-low';
}

function renderAdminDashboard(){
  const app = document.getElementById('app');
  const s = loadStats();

  const totalClicks = Object.values(s.clicksAddCart).reduce((a,b)=>a+b,0);
  const totalOrders = s.checkoutCount || 0;
  const overallConv = totalClicks ? (totalOrders/totalClicks*100) : 0;

  let mostVisited = null;
  PRODUCTS.forEach(p=>{
    const v = s.views[p.id]||0;
    if(!mostVisited || v>mostVisited.v) mostVisited = {p, v};
  });

  const insight = getDailyInsight();

  const tableRows = PRODUCTS
    .map(p=>{
      const views = s.views[p.id]||0;
      const clicks = s.clicksAddCart[p.id]||0;
      const orders = s.checkouts[p.id]||0;
      const conv = clicks ? (orders/clicks*100) : 0;
      return {p, views, clicks, orders, conv};
    })
    .sort((a,b)=>b.clicks-a.clicks)
    .map(r=>`
      <tr>
        <td class="prod-name">${r.p.title}</td>
        <td>${r.views}</td>
        <td>${r.clicks}</td>
        <td>${r.orders}</td>
        <td><span class="conv-pill ${convClass(r.conv)}">${r.conv.toFixed(0)}%</span></td>
      </tr>`).join('');

  app.innerHTML = `
  <div class="admin-dash">
    <div class="admin-top">
      <div>
        <p class="eyebrow">Painel administrativo</p>
        <h1>Estatísticas da loja</h1>
      </div>
      <div class="admin-actions">
        <button type="button" id="admin-reset">Zerar estatísticas</button>
        <button type="button" id="admin-logout">Sair</button>
      </div>
    </div>

    <div class="admin-grid">
      <div class="stat-row">
        <div class="stat-card"><div class="label">Cliques em "Adicionar"</div><div class="value pink">${totalClicks}</div></div>
        <div class="stat-card"><div class="label">Pedidos via WhatsApp</div><div class="value teal">${totalOrders}</div></div>
        <div class="stat-card"><div class="label">Conversão geral</div><div class="value mustard">${overallConv.toFixed(0)}%</div></div>
        <div class="stat-card"><div class="label">Produto mais visitado</div><div class="value" style="font-size:1.05rem;">${mostVisited && mostVisited.v>0 ? mostVisited.p.title : '—'}</div></div>
      </div>

      <div class="insight-card">
        <div>
          <p class="ic-label">Insight do dia</p>
          <p>${insight}</p>
        </div>
      </div>

      <div class="chart-grid">
        <div class="chart-card">
          <h3>Cliques em "Adicionar ao carrinho" por produto</h3>
          <canvas id="chart-clicks"></canvas>
        </div>
        <div class="chart-card">
          <h3>Pedidos finalizados por produto</h3>
          <canvas id="chart-orders"></canvas>
        </div>
        <div class="chart-card">
          <h3>Acessos por horário do dia</h3>
          <canvas id="chart-hourly"></canvas>
        </div>
      </div>

      <div class="admin-table-wrap">
        <h3>Detalhamento por produto</h3>
        <table class="admin-table">
          <thead>
            <tr><th>Produto</th><th>Visualizações</th><th>Cliques</th><th>Pedidos</th><th>Conversão</th></tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>
  </div>`;

  document.getElementById('admin-logout').addEventListener('click', ()=>{
    sessionStorage.removeItem(ADMIN_AUTH_KEY);
    location.hash = '#/';
  });
  document.getElementById('admin-reset').addEventListener('click', ()=>{
    if(confirm('Tem certeza? Isso vai apagar todas as estatísticas salvas.')){
      localStorage.removeItem(STATS_KEY);
      renderAdminDashboard();
    }
  });

  renderCharts(s);
}

function renderCharts(s){
  Object.values(_charts).forEach(c=>{ if(c) c.destroy(); });

  const shortTitle = (t)=> t.length>18 ? t.slice(0,18)+'…' : t;
  const labels = PRODUCTS.map(p=>shortTitle(p.title));
  const clickData = PRODUCTS.map(p=>s.clicksAddCart[p.id]||0);
  const orderData = PRODUCTS.map(p=>s.checkouts[p.id]||0);
  const hourlyLabels = Array.from({length:24}, (_,i)=>`${i}h`);

  const gridColor = 'rgba(255,255,255,.08)';
  const tickColor = 'rgba(255,255,255,.55)';
  const commonScales = {
    x:{ ticks:{ color:tickColor, font:{family:"Space Mono", size:10} }, grid:{ color:gridColor } },
    y:{ beginAtZero:true, ticks:{ color:tickColor, precision:0 }, grid:{ color:gridColor } }
  };

  _charts.clicks = new Chart(document.getElementById('chart-clicks'), {
    type:'bar',
    data:{ labels, datasets:[{ data:clickData, backgroundColor:'#FF3D7F', borderRadius:6 }] },
    options:{ plugins:{legend:{display:false}}, scales:commonScales, responsive:true }
  });

  _charts.orders = new Chart(document.getElementById('chart-orders'), {
    type:'bar',
    data:{ labels, datasets:[{ data:orderData, backgroundColor:'#4FD8BD', borderRadius:6 }] },
    options:{ plugins:{legend:{display:false}}, scales:commonScales, responsive:true }
  });

  _charts.hourly = new Chart(document.getElementById('chart-hourly'), {
    type:'line',
    data:{ labels:hourlyLabels, datasets:[{ data:s.hourly, borderColor:'#FFC83D', backgroundColor:'rgba(255,200,61,.18)', fill:true, tension:.35, pointRadius:0 }] },
    options:{ plugins:{legend:{display:false}}, scales:commonScales, responsive:true }
  });
}

/* ======================================================================
   ROTEADOR + EVENTOS GLOBAIS
   ====================================================================== */
function router(){
  const hash = location.hash || '#/';
  if(hash==='#/cart') renderCart();
  else if(hash==='#/checkout') renderCheckout();
  else if(hash==='#/admin') renderAdminRoute();
  else renderStore();
  updateCartBadge();
  window.scrollTo(0,0);
}

document.getElementById('app').addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;

  if(action==='add'){
    addToCart(id,1);
    trackAddCart(id);
    showToast(`Adicionado: ${getProduct(id).title}`);
  } else if(action==='view'){
    openQuickView(id);
  } else if(action==='inc'){
    const cart = loadCart();
    const it = cart.find(i=>i.id===id);
    setQty(id, (it?it.qty:0)+1);
    renderCart();
  } else if(action==='dec'){
    const cart = loadCart();
    const it = cart.find(i=>i.id===id);
    setQty(id, (it?it.qty:1)-1);
    renderCart();
  } else if(action==='remove'){
    setQty(id, 0);
    renderCart();
  }
});

window.addEventListener('hashchange', router);
window.addEventListener('DOMContentLoaded', ()=>{
  recordHourlyVisit();
  router();
});
</script>
